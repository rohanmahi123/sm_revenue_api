version: "3.9"

services:
  ml-api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env                  # ← loads all variables from your .env file
    volumes:
      - model_store:/app/model_store   # ← persists .pkl and heatmap files
    restart: unless-stopped

volumes:
  model_store:
